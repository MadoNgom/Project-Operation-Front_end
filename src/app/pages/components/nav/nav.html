<div class="container mx-auto px-4 md:px-8">
  <nav class="flex items-center justify-between py-4">
    <div
      class="text-2xl md:text-3xl text-bold cursor-pointer"
      (click)="navigateToDashboard()"
    >
      Fluxx
    </div>
    <div class="flex items-center space-x-4">
      <ul class="hidden md:flex space-x-6 font-medium" *ngIf="!isAuthenticated">
        <li>
          <a href="#" class="hover:text-gray-400 transition text-sm">Accueil</a>
        </li>
        <li>
          <a href="#" class="hover:text-gray-400 transition text-sm"
            >Découvrir</a
          >
        </li>
        <li>
          <a href="#" class="hover:text-gray-400 transition text-sm"
            >Transfert</a
          >
        </li>
      </ul>

      <!-- Menu pour utilisateurs connectés -->

      <div class="flex items-center space-x-4" *ngIf="isAuthenticated">
        <span class="text-sm text-gray-300"
          >Bienvenue, {{ userInfo?.prenom }}</span
        >
        <button
          class="bg-blue-500 hover:bg-blue-600 font-semibold py-1 px-4 border-0 rounded-md cursor-pointer text-sm transition transform hover:scale-105"
          (click)="navigateToDashboard()"
        >
          Dashboard
        </button>
        <button
          class="bg-red-500 hover:bg-red-600 font-semibold py-1 px-4 border-0 rounded-md cursor-pointer text-sm transition transform hover:scale-105"
          (click)="logout()"
        >
          Déconnexion
        </button>
      </div>

      <!-- Bouton de connexion pour utilisateurs non connectés -->
      <button
        *ngIf="!isAuthenticated"
        class="bg-orange-500 hover:bg-orange-600 font-semibold py-1 px-4 border-0 rounded-md cursor-pointer text-sm transition transform hover:scale-105"
        (click)="navigateToLogin()"
      >
        Se connecter
      </button>
    </div>
  </nav>
</div>
