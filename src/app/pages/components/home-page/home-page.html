<section
  class="min-h-screen bg-gradient-to-br from-purple-700 to-orange-600 text-white"
>
  <!-- Navigation with max-width container -->
  <app-nav></app-nav>
  <!-- Main Content - using same container width as nav -->
  <div
    class="container mx-auto px-4 md:px-8 py-8 flex flex-col lg:flex-row items-center justify-between"
  >
    <!-- Left: Text -->
    <div class="w-full lg:w-1/2 space-y-6 mb-10 lg:mb-0 lg:pr-8">
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold leading-tight">
        Transfert d'argent facile
      </h1>
      <p class="text-lg sm:text-xl md:text-2xl">
        Envoyez et recevez d'argent en toute sécurité et fiabilité avec notre
        plateforme.
      </p>
      <button
      (click)="navigateToLogin()"
        class="bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 px-6 rounded-lg transition transform hover:scale-105"
      >
        Commencez maintenant
      </button>
    </div>

    <!-- Right: Illustration -->
    <div class="w-full lg:w-1/2">
      <img
        src="../../../../assets/ransfer-illustration.png"
        alt="Transfert illustration"
        class="w-full max-w-md mx-auto lg:mx-0 lg:ml-auto h-auto"
      />
    </div>
  </div>
</section>
