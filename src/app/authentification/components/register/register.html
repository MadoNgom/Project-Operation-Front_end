<form class="space-y-4" [formGroup]="_form" (ngSubmit)="register()">
  <div class="grid grid-cols-2 gap-4">
    <input
      type="text"
      placeholder="Prénom"
      name="prenom"
      formControlName="prenom"
      required
      title="Veuillez entrer votre prenom"
      class="w-full px-4 py-3 border placeholder:text-sm placeholder:text-gray-500 border-purple-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400"
    />
    <input
      type="text"
      placeholder="Nom"
      name="nom"
      formControlName="nom"
      required
      title="Veuillez entrer votre nom de famille (lettres uniquement)"
      class="w-full px-4 py-3 border placeholder:text-sm placeholder:text-gray-500 border-purple-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400"
    />
  </div>

  <input
    type="tel"
    placeholder="telephone"
    id="telephone"
    formControlName="telephone"
    required
    pattern="^[0-9]{9,}$"
    title="Veuillez entrer au moins 9 chiffres"
    class="w-full px-4 py-3 border placeholder:text-sm placeholder:text-gray-500 border-purple-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400"
  />

  <input
    type="email"
    id="email"
    name="email"
    placeholder="Adresse email"
    formControlName="email"
    required
    title="Veuillez entrer une adresse email valide (ex: nom@exemple.com)"
    class="w-full px-4 py-3 border placeholder:text-sm placeholder:text-gray-500 border-purple-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400"
  />

  <input
    type="text"
    name="adresse"
    placeholder="Adresse"
    formControlName="adresse"
    required
    class="w-full px-4 py-3 border placeholder:text-sm placeholder:text-gray-500 border-purple-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400"
  />

  <input
    type="password"
    placeholder="Mot de passe"
    name="password"
    formControlName="password"
    required
    title="Le mot de passe doit contenir au moins 8 caractères"
    class="w-full px-4 py-3 border placeholder:text-sm placeholder:text-gray-500 border-purple-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-400"
  />

  <button
    type="submit"
    [disabled]="!_form.valid"
    class="w-full py-3 rounded-md text-white font-semibold bg-gradient-to-r from-purple-500 to-orange-400 hover:from-purple-600 hover:to-orange-500 transition cursor-pointer"
  >
    S'inscrire
  </button>
</form>
